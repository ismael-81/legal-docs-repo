<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentación Legal - Vive Coding</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --text: #f8fafc;
            --accent: #38bdf8;
            --card: rgba(30, 41, 59, 0.7);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            letter-spacing: -0.025em;
        }
        .project-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .project-item {
            margin-bottom: 1rem;
        }
        .project-item a {
            color: var(--text);
            text-decoration: none;
            display: block;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .project-item a:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Directorio de Documentación Legal</h1>
        <div class="project-list">
            <div class="project-item">
                <a href="./puente-salud-conectada/">
                    <strong>Puente Salud Conectada</strong><br>
                    <small>Política de Privacidad y Términos</small>
                </a>
            </div>
            <!-- Futuros proyectos aquí -->
        </div>
        <footer>
            &copy; 2026 Vive Coding / Ismael Ros
        </footer>
    </div>
</body>
</html>
